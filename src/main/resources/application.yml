server:
  # 8080 is commonly used by local database/listener tools. 8081 keeps the
  # portfolio app easy to run in IntelliJ without stopping unrelated software.
  port: 8081

spring:
  application:
    name: fintech-ledger-monolith
  datasource:
    # H2 normally folds unquoted identifiers to uppercase. We keep identifiers
    # lowercase and ask Hibernate to quote them so repeated local runs do not
    # drift between APP_USERS and app_users.
    url: jdbc:h2:file:./data/fintech-ledger;MODE=PostgreSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        globally_quoted_identifiers: true
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # Demo secret only. Production systems should load this from a secret manager and rotate it.
    secret: "YmFja2VuZC1wb3J0Zm9saW8tZmludGVjaC1sZWRnZXItbW9ub2xpdGgtand0LXNlY3JldC0yMDI2"
    expiration-minutes: 180
  fraud:
    manual-review-threshold: 70
    hard-block-threshold: 90
